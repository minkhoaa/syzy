version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: syzy-postgres
    restart: always
    environment:
      POSTGRES_USER: syzy
      POSTGRES_PASSWORD: syzy
      POSTGRES_DB: syzy_waitlist
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syzy -d syzy_waitlist"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - syzy-network

  redis:
    image: redis:7-alpine
    container_name: syzy-redis
    restart: always
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - syzy-network

  backend:
    build:
      context: ./syzy-be
      dockerfile: Dockerfile
    container_name: syzy-backend
    restart: always
    ports:
      - "7788:7788"
    environment:
      - NODE_ENV=production
      - PORT=7788
      - DATABASE_URL=postgresql://syzy:syzy@postgres:5432/syzy_waitlist
      - REDIS_URL=redis://redis:6379
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM:-admin@syzy.space}
      - WAITLIST_APP_ORIGIN=${WAITLIST_APP_ORIGIN:-http://localhost:3000}
      - WAITLIST_APP_DOMAIN=${WAITLIST_APP_DOMAIN:-localhost}
      - WAITLIST_MEMBER_JWT_SECRET=${WAITLIST_MEMBER_JWT_SECRET:-syzy-waitlist-member-secret-32chars-minimum}
      - WAITLIST_ADMIN_JWT_SECRET=${WAITLIST_ADMIN_JWT_SECRET:-syzy-waitlist-admin-secret-32chars-minimum}
      - WAITLIST_MEMBER_REFRESH_SECRET=${WAITLIST_MEMBER_REFRESH_SECRET:-syzy-waitlist-member-refresh-32chars-minimum}
      - WAITLIST_ADMIN_REFRESH_SECRET=${WAITLIST_ADMIN_REFRESH_SECRET:-syzy-waitlist-admin-refresh-32chars-minimum}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7788/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - syzy-network

  frontend:
    build:
      context: ./syzy-fe
      dockerfile: Dockerfile
    container_name: syzy-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:7788}
      - NEXT_PUBLIC_RPC_URL=${NEXT_PUBLIC_RPC_URL:-https://api.devnet.solana.com}
      - NEXT_PUBLIC_REOWN_PROJECT_ID=${NEXT_PUBLIC_REOWN_PROJECT_ID}
      - NEXT_PUBLIC_PROGRAM_ID=${NEXT_PUBLIC_PROGRAM_ID}
      - NEXT_PUBLIC_WAITLIST_API_URL=${NEXT_PUBLIC_WAITLIST_API_URL:-http://localhost:7788}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - syzy-network

volumes:
  postgres_data:
  redis_data:

networks:
  syzy-network:
    driver: bridge