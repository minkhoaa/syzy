name: Deploy Frontend

on:
  push:
    branches: [main, master]
    paths:
      - 'syzy-fe/**'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deploy even without changes'
        required: false
        default: 'false'

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/syzy-frontend
  FE_REPO: MorcaLabs/syzy-fe
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout frontend repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.FE_REPO }}
          path: syzy-fe
          fetch-depth: 0

      - name: Verify checkout
        run: |
          ls -la syzy-fe/
          if [ ! -f "syzy-fe/Dockerfile" ]; then
            echo "ERROR: Dockerfile not found!"
            exit 1
          fi
          if [ ! -f "syzy-fe/package.json" ]; then
            echo "ERROR: package.json not found!"
            exit 1
          fi
          echo "✓ Frontend checkout successful"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./syzy-fe
          file: ./syzy-fe/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_RPC_URL=${{ secrets.NEXT_PUBLIC_RPC_URL }}
            NEXT_PUBLIC_REOWN_PROJECT_ID=${{ secrets.NEXT_PUBLIC_REOWN_PROJECT_ID }}
            NEXT_PUBLIC_PROGRAM_ID=${{ secrets.NEXT_PUBLIC_PROGRAM_ID }}
            NEXT_PUBLIC_WAITLIST_API_URL=${{ secrets.NEXT_PUBLIC_WAITLIST_API_URL }}

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          envs: IMAGE_NAME,GHCR_TOKEN,GHCR_USER
          script: |
            # Login to GHCR using PAT
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # Pull new image
            docker pull ${IMAGE_NAME}:latest

            # Create network if not exists
            docker network create syzy-network 2>/dev/null || true

            # Stop and remove old container
            docker stop syzy-frontend || true
            docker rm syzy-frontend || true

            # Run new container
            docker run -d \
              --name syzy-frontend \
              --network syzy-network \
              --restart always \
              -p 127.0.0.1:3000:3000 \
              ${IMAGE_NAME}:latest

            # Cleanup old images
            docker image prune -f

            # Health check with retry
            echo "Waiting for frontend to start..."
            for i in 1 2 3 4 5; do
              sleep 5
              if curl -f http://localhost:3000 2>/dev/null; then
                echo "Frontend is healthy!"
                exit 0
              fi
              echo "Attempt $i failed, retrying..."
            done
            echo "Health check failed after 5 attempts"
            docker logs syzy-frontend --tail 50
            exit 1
