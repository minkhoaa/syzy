name: Deploy Backend

on:
  push:
    branches: [main, master]
    paths:
      - 'syzy-be/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/syzy-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./syzy-be
          file: ./syzy-be/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          envs: IMAGE_NAME,GHCR_TOKEN,GHCR_USER
          script: |
            # Login to GHCR
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # Pull new image
            docker pull ${IMAGE_NAME}:latest

            # Create network if not exists
            docker network create syzy-network 2>/dev/null || true

            # Stop and remove old container
            docker stop syzy-backend || true
            docker rm syzy-backend || true

            # Run Prisma migrations
            docker run --rm \
              --network syzy-network \
              -e DATABASE_URL='${{ secrets.DB_URL }}' \
              ${IMAGE_NAME}:latest \
              npx prisma migrate deploy || echo "Migration completed or skipped"

            # Run new container
            docker run -d \
              --name syzy-backend \
              --network syzy-network \
              --restart always \
              -p 127.0.0.1:7788:7788 \
              -e NODE_ENV=production \
              -e DATABASE_URL='${{ secrets.DB_URL }}' \
              -e REDIS_URL='${{ secrets.REDIS_URL }}' \
              -e RESEND_API_KEY='${{ secrets.RESEND_API_KEY }}' \
              -e EMAIL_FROM='${{ secrets.EMAIL_FROM }}' \
              -e WAITLIST_APP_ORIGIN='${{ secrets.WAITLIST_APP_ORIGIN }}' \
              -e WAITLIST_MEMBER_JWT_SECRET='${{ secrets.WAITLIST_MEMBER_JWT_SECRET }}' \
              -e WAITLIST_ADMIN_JWT_SECRET='${{ secrets.WAITLIST_ADMIN_JWT_SECRET }}' \
              -e WAITLIST_MEMBER_REFRESH_SECRET='${{ secrets.WAITLIST_MEMBER_REFRESH_SECRET }}' \
              -e WAITLIST_ADMIN_REFRESH_SECRET='${{ secrets.WAITLIST_ADMIN_REFRESH_SECRET }}' \
              ${IMAGE_NAME}:latest

            # Cleanup old images
            docker image prune -f

            # Health check
            echo "Waiting for backend to start..."
            for i in 1 2 3 4 5; do
              sleep 5
              if curl -f http://localhost:7788/health 2>/dev/null; then
                echo "Backend is healthy!"
                exit 0
              fi
              echo "Attempt $i failed, retrying..."
            done
            echo "Health check failed"
            docker logs syzy-backend --tail 50
            exit 1
