name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'syzy-be/**'
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/syzy-backend
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./
          dockerfile: syzy-be/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # Login to GHCR
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull new image
            docker pull ${{ env.IMAGE_NAME }}:latest

            # Stop and remove old container
            docker stop syzy-backend || true
            docker rm syzy-backend || true

            # Run new container
            docker run -d \
              --name syzy-backend \
              --restart always \
              -p 7788:7788 \
              -e DATABASE_URL='${{ secrets.DB_URL }}' \
              -e REDIS_URL='${{ secrets.REDIS_URL }}' \
              -e RESEND_API_KEY='${{ secrets.RESEND_API_KEY }}' \
              -e EMAIL_FROM='${{ secrets.EMAIL_FROM }}' \
              -e WAITLIST_APP_ORIGIN='${{ secrets.WAITLIST_APP_ORIGIN }}' \
              -e WAITLIST_MEMBER_JWT_SECRET='${{ secrets.WAITLIST_MEMBER_JWT_SECRET }}' \
              -e WAITLIST_ADMIN_JWT_SECRET='${{ secrets.WAITLIST_ADMIN_JWT_SECRET }}' \
              -e WAITLIST_MEMBER_REFRESH_SECRET='${{ secrets.WAITLIST_MEMBER_REFRESH_SECRET }}' \
              -e WAITLIST_ADMIN_REFRESH_SECRET='${{ secrets.WAITLIST_ADMIN_REFRESH_SECRET }}' \
              ${{ env.IMAGE_NAME }}:latest

            # Cleanup
            docker image prune -f

            # Health check
            sleep 10
            curl -f http://localhost:7788/health || exit 1
