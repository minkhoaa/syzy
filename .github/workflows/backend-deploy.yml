name: Deploy Backend

on:
  push:
    branches: [main, master]
    paths:
      - 'syzy-be/**'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deploy even without changes'
        required: false
        default: 'false'

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/syzy-backend
  BE_REPO: MorcaLabs/syzy-be
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout backend repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.BE_REPO }}
          token: ${{ secrets.GHCR_TOKEN }}
          path: syzy-be
          fetch-depth: 0

      - name: Verify and patch Dockerfile
        run: |
          ls -la syzy-be/
          if [ ! -f "syzy-be/package.json" ]; then
            echo "ERROR: package.json not found!"
            exit 1
          fi
          
          # Create optimized Dockerfile
          cat > syzy-be/Dockerfile << 'DOCKERFILE'
          FROM node:20-alpine AS builder
          WORKDIR /app
          COPY package.json pnpm-lock.yaml ./
          RUN corepack enable && corepack prepare pnpm@latest --activate
          COPY prisma ./prisma
          RUN pnpm install --frozen-lockfile && pnpm exec prisma generate
          COPY . .
          RUN pnpm build

          FROM node:20-alpine AS production
          WORKDIR /app
          RUN corepack enable && corepack prepare pnpm@latest --activate
          COPY --from=builder /app/dist ./dist
          COPY --from=builder /app/node_modules ./node_modules
          COPY --from=builder /app/prisma ./prisma
          COPY --from=builder /app/package.json ./
          ENV NODE_ENV=production PORT=7788
          EXPOSE 7788
          HEALTHCHECK --interval=30s --timeout=3s --start-period=10s --retries=3 \
            CMD wget --no-verbose --tries=1 --spider http://localhost:7788/health || exit 1
          CMD ["node", "dist/main.js"]
          DOCKERFILE
          
          echo "✓ Backend Dockerfile patched"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./syzy-be
          file: ./syzy-be/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          envs: IMAGE_NAME,GHCR_TOKEN,GHCR_USER
          script: |
            # Login to GHCR using PAT
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # Pull new image
            docker pull ${IMAGE_NAME}:latest

            # Create network if not exists
            docker network create syzy-network 2>/dev/null || true

            # Stop and remove old container
            docker stop syzy-backend || true
            docker rm syzy-backend || true

            # Run Prisma migrations
            docker run --rm \
              --network syzy-network \
              -e DATABASE_URL='${{ secrets.DB_URL }}' \
              ${IMAGE_NAME}:latest \
              npx prisma migrate deploy || echo "Migration skipped or failed"

            # Run new container
            docker run -d \
              --name syzy-backend \
              --network syzy-network \
              --restart always \
              -p 127.0.0.1:7788:7788 \
              -e NODE_ENV=production \
              -e DATABASE_URL='${{ secrets.DB_URL }}' \
              -e REDIS_URL='${{ secrets.REDIS_URL }}' \
              -e RESEND_API_KEY='${{ secrets.RESEND_API_KEY }}' \
              -e EMAIL_FROM='${{ secrets.EMAIL_FROM }}' \
              -e WAITLIST_APP_ORIGIN='${{ secrets.WAITLIST_APP_ORIGIN }}' \
              -e WAITLIST_MEMBER_JWT_SECRET='${{ secrets.WAITLIST_MEMBER_JWT_SECRET }}' \
              -e WAITLIST_ADMIN_JWT_SECRET='${{ secrets.WAITLIST_ADMIN_JWT_SECRET }}' \
              -e WAITLIST_MEMBER_REFRESH_SECRET='${{ secrets.WAITLIST_MEMBER_REFRESH_SECRET }}' \
              -e WAITLIST_ADMIN_REFRESH_SECRET='${{ secrets.WAITLIST_ADMIN_REFRESH_SECRET }}' \
              ${IMAGE_NAME}:latest

            # Cleanup old images
            docker image prune -f

            # Health check with retry
            echo "Waiting for backend to start..."
            for i in 1 2 3 4 5; do
              sleep 5
              if curl -f http://localhost:7788/health 2>/dev/null; then
                echo "Backend is healthy!"
                exit 0
              fi
              echo "Attempt $i failed, retrying..."
            done
            echo "Health check failed after 5 attempts"
            docker logs syzy-backend --tail 50
            exit 1
