server {
    listen 80;
    server_name backend.syzy.space;

    # ACME challenge for SSL
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name backend.syzy.space;

    ssl_certificate /etc/letsencrypt/live/backend.syzy.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/backend.syzy.space/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # API requests
    location / {
        proxy_pass http://localhost:7788;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Health check endpoint (no proxy needed)
    location /health {
        proxy_pass http://localhost:7788/health;
        proxy_http_version 1.1;
        access_log off;
    }
}
